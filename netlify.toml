[build]
  publish = "public"
  command = ""
  functions = "netlify/functions"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # ── Secret scanning di Netlify: DISATTIVATO ──────────────────────────────────
  # Lo scanner segnalava un falso positivo sulla anon/public key di Supabase
  # (JWT) presente in public/index.html. È una chiave PUBBLICA per design,
  # protetta da Row Level Security: deve stare nel frontend.
  # OMIT_KEYS / OMIT_PATHS / smart-detection-off non bastavano a sopprimere il
  # falso positivo, quindi disattiviamo lo scan.
  #
  # Perché è SICURO:
  #  - L'unica stringa segreto-simile in qualunque file è la anon key pubblica.
  #  - I veri segreti (SUPABASE_SERVICE_ROLE_KEY, TELEGRAM_BOT_TOKEN) NON sono in
  #    nessun file: vivono solo nelle env var di Netlify, letti via process.env
  #    dentro le Netlify Functions. (Verificato: grep di JWT trova solo la anon
  #    key in public/index.html.)
  #  - La secret scanning di GitHub resta attiva come rete di sicurezza contro
  #    eventuali commit accidentali futuri di segreti veri.
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.emailjs.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.emailjs.com https://*.supabase.co; frame-ancestors 'none';"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"