[build]
  publish = "public"
  command = ""
  functions = "netlify/functions"

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  # La anon/public key di Supabase è volutamente nel frontend (protetta da RLS):
  # la escludiamo dallo scan. NON escludiamo SUPABASE_SERVICE_ROLE_KEY né
  # TELEGRAM_BOT_TOKEN, che restano protetti dallo scan dei valori dichiarati.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  # Disattiva la sola rilevazione "per somiglianza" (flagga la JWT pubblica come
  # falso positivo); lo scan dei valori dei segreti dichiarati resta attivo.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"
  # public/index.html contiene SOLO la anon/public key di Supabase (frontend,
  # protetta da RLS): lo escludiamo dallo scan dei path. I veri segreti
  # (SERVICE_ROLE_KEY, TELEGRAM_BOT_TOKEN) NON sono in alcun file — vivono solo
  # nelle env var di Netlify — quindi restano pienamente protetti.
  # Path nelle varie forme con cui lo scanner può riferirsi al file (relativo a
  # repo root e relativo alla publish dir) + glob di sicurezza.
  SECRETS_SCAN_OMIT_PATHS = "public/index.html,index.html,**/index.html"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.emailjs.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.emailjs.com https://*.supabase.co; frame-ancestors 'none';"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"